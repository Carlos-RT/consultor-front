<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Cobrador</title>

<style>
body {
    font-family: Arial;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.mobile {
    width: 100%;
    max-width: 400px;
    background: #f5f5f5;
    padding: 20px;
    border: 2px solid #aaa;
}

input, button {
    width: 100%;
    padding: 10px;
    margin-bottom: 10px;
}

button {
    background: #4a90e2;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="mobile">
    <h3>Login Cobrador</h3>
    <input id="usuario" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
</div>

<script>

const API_URL = "https://consultor-back.vercel.app/";

async function login() {

    const usuario = document.getElementById("usuario").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!usuario || !password) {
        alert("Todos los campos son obligatorios");
        return;
    }

    const res = await fetch(`${API_URL}/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ usuario, password })
    });

    if (!res.ok) {
        alert("Credenciales incorrectas");
        return;
    }

    const data = await res.json();

    localStorage.setItem("cobradorId", data.id);
    localStorage.setItem("cobradorNombre", data.nombre);

    window.location.href = "interfaz_movil.html";
}

</script>
</body>
</html>
